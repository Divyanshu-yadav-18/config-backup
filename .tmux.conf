# Enable True color support
set -g default-shell /bin/zsh
set -g default-command "/bin/zsh -l"

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:Tc"
set -gq allow-passthrough on

set -g base-index 1
set -g pane-base-index 1

set-option -g prefix C-b
set-option -g prefix2 none

set -g detach-on-destroy off

# Utility bindings
unbind r
bind r source-file ~/.config/tmux/tmux.conf

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind v
bind v copy-mode

# resizing panes with hjkl
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# maximize panes
bind -r m resize-pane -Z

# disable kill accept prompt
bind x kill-pane

# mouse support
set -g mouse on

# vim shell navigations and selects in tmux panes
set-window-option -g mode-keys vi
bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-selection

# Sesh keybinds
bind "T" display-popup -E -w 40% "sesh connect \"$(
    sesh list -i | gum filter --no-strip-ansi --limit 1 --placeholder 'Pick session' --prompt='🛸 '
)\""

bind "K" run-shell "sesh connect \"$(
        sesh list --icons | fzf-tmux -p 90%,80% \
        --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
        --header '🔑 ^a all | ^t tmux | ^g conf | ^x zoxide | ^r rename | ^d tmux kill | ^f find' \
        --bind 'tab:down,btab:up' \
        --bind 'ctrl-a:change-prompt(🛸  )+reload(sesh list --icons)' \
        --bind 'ctrl-t:change-prompt(◧  )+reload(sesh list -t --icons)' \
        --bind 'ctrl-g:change-prompt(⛯  )+reload(sesh list -c --icons)' \
        --bind 'ctrl-x:change-prompt(🗃  )+reload(sesh list -z --icons)' \
        --bind 'ctrl-f:change-prompt(🔭  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
        --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(👽  )+reload(sesh list --icons)' \
        --preview-window 'right:45%' \
        --preview 'sesh preview {}'
)\""

# tmux goodies
bind -r f run-shell "tmux neww ~/scripts/tmux-sessionizer.sh"
bind n command-prompt "new-session -s '%%'"

# tmux display popups
bind C-y display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "yazi"
bind C-t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "zsh"
bind C-g display-popup -d "#{pane-current-path}" -w 90% -h 90% -E "lazygit"
bind C-m display-popup -w 95% -h 95% -E "rmpc"
bind d display-menu -T "#[align=centre]Config" -x C -y C \
    ".zshrc"            z  "display-popup -w 85% -h 85% -E 'nvim ~/.zsh/.zshrc'" \
    ".zprofile"         p  "display-popup -w 85% -h 85% -E 'nvim ~/.zsh/.zprofile'" \
    ".tmux.conf"        t  "display-popup -w 85% -h 85% -E 'nvim ~/.tmux.conf'" \
    ".nvim"             v  "display-popup -w 95% -h 95% -d "~/dotfiles/nvim/.config/nvim" -E 'nvim ~/dotfiles/nvim/.config/nvim'" \
    "quit"              q  ""

# Drag copy using mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# tmux plugin manager
set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/.tmux/plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin "christoomey/vim-tmux-navigator"
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'tmux-plugins/tmux-battery'

set -g @sessionx-bind 'o'

# Cyberpunk palette (hardcoded)
set -g @bg       "#11111b"
set -g @surface0 "#1e1e2e"
set -g @surface1 "#313244"
set -g @overlay0 "#6c7086"
set -g @overlay1 "#7f849c"
set -g @cyan     "#89dceb"
set -g @mauve    "#cba6f7"
set -g @pink     "#f5c2e7"
set -g @red      "#f38ba8"
set -g @green    "#a6e3a1"
set -g @yellow   "#f9e2af"

# Pre-built pill segments (avoids comma-splitting bug inside #{?...} ternaries)
set -ga status-left "#{?client_prefix,#{E:@pill_session_prefix},#{E:@pill_session_normal}}"
set -g @pill_session_normal "#[bg=#{@surface1},fg=#{@cyan},bold] 󰆍  #S "

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_maroon}]  #{pane_current_command} "

set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"

# status right look and feel
set -g status-right-length 250
set -g status-right ""
set -ga status-right "#[bg=#{@bg},fg=#{@overlay0}]│"
set -ga status-right "#[bg=#{@bg},fg=#{@pink}] 󰅐 %H:%M "
set -ga status-right "#[bg=#{@bg},fg=#{@overlay0}]│"

# Configure Tmux
set -g status-position bottom
set -g status-style "bg=#{@bg}"
set -g status-justify "absolute-centre"

# pane border look and feel
# setw -g pane-border-status top
# setw -g pane-border-format ""
# setw -g pane-active-border-style "bg=#{@bg},fg=#{@overlay0}"
# setw -g pane-border-style "bg=#{@bg},fg=#{@surface1}"
# setw -g pane-border-lines single

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@bg},fg=#{@overlay0}"
set -g window-status-last-style "bg=#{@bg},fg=#{@overlay1}"

set -g window-status-activity-style "bg=#{@red},fg=#{@bg}"
set -g window-status-bell-style "bg=#{@red},fg=#{@bg},bold"
set -gF window-status-separator "#[bg=#{@bg},fg=#{@overlay0}]│"

set -g window-status-current-format " 󰐊 #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@surface1},fg=#{@cyan},bold"

run '~/.config/tmux/.tmux/plugins/tpm/tpm'
