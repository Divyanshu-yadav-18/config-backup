# Enable True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:Tc"
set -gq allow-passthrough on

set -g base-index 1
set -g pane-base-index 1

set-option -g prefix C-b
set-option -g prefix2 none

set -g detach-on-destroy off

# Utility bindings
unbind r
bind r source-file ~/.config/tmux/tmux.conf

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind v
bind v copy-mode

# resizing panes with hjkl
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# maximize panes
bind -r m resize-pane -Z

# disable kill accept prompt
bind x kill-pane

# mouse support
set -g mouse on

# vim shell navigations and selects in tmux panes
set-window-option -g mode-keys vi
bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-selection

# Sesh keybinds
# sesh w/ gum dir selector
bind "T" display-popup -E -w 40% "sesh connect \"$(
    sesh list -i | gum filter --no-strip-ansi --limit 1 --placeholder 'Pick session' --prompt='🛸 '
)\""

# sesh w/ (tmux fzf)
bind "K" run-shell "sesh connect \"$(
        sesh list --icons | fzf-tmux -p 90%,80% \
        --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
        --header '🔑 ^a all | ^t tmux | ^g conf | ^x zoxide | ^r rename | ^d tmux kill | ^f find' \
        --bind 'tab:down,btab:up' \
        --bind 'ctrl-a:change-prompt(🛸  )+reload(sesh list --icons)' \
        --bind 'ctrl-t:change-prompt(◧  )+reload(sesh list -t --icons)' \
        --bind 'ctrl-g:change-prompt(⛯  )+reload(sesh list -c --icons)' \
        --bind 'ctrl-x:change-prompt(🗃  )+reload(sesh list -z --icons)' \
        --bind 'ctrl-f:change-prompt(🔭  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
        --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(👽  )+reload(sesh list --icons)' \
        --preview-window 'right:45%' \
        --preview 'sesh preview {}'
)\""

# tmux goodies
bind -r f run-shell "tmux neww ~/scripts/tmux-sessionizer.sh"
bind n command-prompt "new-session -s '%%'"

# tmux display popups
bind C-y display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "yazi" # yazi float
bind C-t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "zsh" # quick floating terminal
bind C-g display-popup -d "#{pane-current-path}" -w 90% -h 90% -E "lazygit" # lazygit float
bind C-m display-popup -w 95% -h 95% -E "rmpc" # music float
bind d display-menu -T "#[align=centre]Config" -x C -y C \
    ".zshrc"            z  "display-popup -w 85% -h 85% -E 'nvim ~/.zsh/.zshrc'" \
    ".zprofile"         p  "display-popup -w 85% -h 85% -E 'nvim ~/.zsh/.zprofile'" \
    ".tmux.conf"        t  "display-popup -w 85% -h 85% -E 'nvim ~/.tmux.conf'" \
    ".nvim"             v  "display-popup -w 95% -h 95% -d "~/dotfiles/nvim/.config/nvim" -E 'nvim ~/dotfiles/nvim/.config/nvim'" \
    "quit"              q  ""

# Drag copy using mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# tmux plugin manager 
set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/.tmux/plugins
set -g @plugin 'tmux-plugins/tpm' # must be the first plugin
set -g @plugin "christoomey/vim-tmux-navigator"
set -g @plugin 'omerxx/tmux-sessionx' # default keybind "<prefix> O" to activate
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-battery'

set -g @sessionx-bind 'o'

# Configure Catppuccin (kept for plugin compatibility, but colors below are hardcoded
# since @thm_* variables are unreliable across catppuccin/tmux plugin versions)
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# Catppuccin Mocha palette (hardcoded)
set -g @mocha_bg        "#1e1e2e"
set -g @mocha_surface0  "#313244"
set -g @mocha_overlay0  "#6c7086"
set -g @mocha_overlay1  "#7f849c"
set -g @mocha_blue      "#89b4fa"
set -g @mocha_green     "#a6e3a1"
set -g @mocha_red       "#f38ba8"
set -g @mocha_yellow    "#f9e2af"
set -g @mocha_rosewater "#f5e0dc"

# Configure Online status
set -g @online_icon "ok"
set -g @offline_icon "nok"


set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#[bg=#{@mocha_red},fg=#{@mocha_bg},bold] 󰆍  #S ,#[bg=#{@mocha_surface0},fg=#{@mocha_green},bold] 󰆍  #S }"
set -ga status-left "#[bg=#{@mocha_bg},fg=#{@mocha_surface0}]"
set -ga status-left "#[bg=#{@mocha_surface0},fg=#{@mocha_blue}] 󰉖 #{b:pane_current_path} "
set -ga status-left "#[bg=#{@mocha_bg},fg=#{@mocha_overlay0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@mocha_bg},fg=#{@mocha_yellow}]#{?window_zoomed_flag,  zoom ,}"



# status right look and feel

set -g status-right-length 250
set -g status-right ""
set -ga status-right "#[bg=#{@mocha_bg},fg=#{@mocha_overlay0}]│"
set -ga status-right "#[bg=#{@mocha_bg},fg=#{@mocha_rosewater}] 󰅐 %H:%M "
set -ga status-right "#[bg=#{@mocha_bg},fg=#{@mocha_overlay0}]│"
set -ga status-right "#{?#{==:#{battery_percentage},},,#[bg=#{@mocha_bg},fg=#{@mocha_green}] #{battery_icon} #{battery_percentage} }"
set -ga status-right "#[bg=#{@mocha_bg},fg=#{@mocha_overlay0}]│"
set -ga status-right "#[bg=#{@mocha_bg}]#{?#{==:#{online_status},ok},#[fg=#{@mocha_rosewater}] 󰖩 on ,#[fg=#{@mocha_red},bold]#[reverse] 󰖪 off }"

# Configure Tmux
set -g status-position bottom
set -g status-style "bg=#{@mocha_bg}"
set -g status-justify "absolute-centre"# pane border look and feel

# setw -g pane-border-status top
# setw -g pane-border-format ""
# setw -g pane-active-border-style "bg=#{@mocha_bg},fg=#{@mocha_overlay0}"
# setw -g pane-border-style "bg=#{@mocha_bg},fg=#{@mocha_surface0}"
# setw -g pane-border-lines single

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@mocha_bg},fg=#{@mocha_overlay0}"
set -g window-status-last-style "bg=#{@mocha_bg},fg=#{@mocha_overlay1}"

set -g window-status-activity-style "bg=#{@mocha_red},fg=#{@mocha_bg}"
set -g window-status-bell-style "bg=#{@mocha_red},fg=#{@mocha_bg},bold"
set -gF window-status-separator "#[bg=#{@mocha_bg},fg=#{@mocha_overlay0}]│"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@mocha_blue},fg=#{@mocha_bg},bold"

run '~/.config/tmux/.tmux/plugins/tpm/tpm' # always keep this line last
